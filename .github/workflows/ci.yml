# CI pipeline (core §16, app §A14.2, REQ-BUILD-003). A red stage blocks merge.
# Stages: typecheck → OP_RETURN lint → unit+property+interpreter tests → reproduce →
# traceability → Go vet+test. Runs the same `pnpm ci` the build uses locally.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (relay + indexer)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false # the Go modules are stdlib-only (no go.sum)

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm@9.0.0)

      - name: Set up Node 24 (native TypeScript type-stripping)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run the full CI pipeline
        run: pnpm run ci
